                                                        {/* Team 2 Side */}
                                                        <div className="flex items-center gap-8 flex-1">
                                                            {team2Guess && <span className="text-gray-400 text-3xl flex-1 text-center">{Math.abs((currentRound === 14 ? tieBreakerClosestToQuestions : legacyClosestToQuestions)[bonusQuestionIndex].answer - parseInt(team2Guess))}</span>}
                                                            <span className="text-orange-400 font-bold text-5xl">{team2Guess || '?'}</span>
                                                        </div>
                                                    </div>
                                                ) : null
                                            ) : showQuestion ? (
                                                <>
                                                    {/* Original answer text - invisible when image overlay showing */}
                                                    <p 
                                                        ref={answerTextRef}
                                                        className="text-yellow-400 font-bold text-5xl" 
                                                        style={{
                                                            opacity: showImageOverlay ? 0 : 
                                                                    (userMode === 'stream' && !showAnswer) ? 0 : 
                                                                    (showAnswer ? 1 : 0.3)
                                                        }}
                                                    >
                                                        {currentAnswerText}
                                                    </p>
                                                    {/* Portal copy - visible above image overlay, host only */}
                                                    {showImageOverlay && userMode === 'host' && answerTextPosition && ReactDOM.createPortal(
                                                        <p className="text-yellow-400 font-bold text-5xl" style={{
                                                            position: 'fixed',
                                                            top: `${answerTextPosition.top}px`,
                                                            left: `${answerTextPosition.left}px`,
                                                            width: `${answerTextPosition.width}px`,
                                                            zIndex: 48,
                                                            textAlign: 'center',
                                                            pointerEvents: 'none',
                                                            textShadow: '2px 2px 8px rgba(0,0,0,0.8)',
                                                            margin: 0,
                                                            opacity: showAnswer ? 1 : 0.3
                                                        }}>
                                                            {currentAnswerText}
                                                        </p>,
                                                        document.body
                                                    )}
                                                </>
                                            ) : null}
                                        </div>
                                    )}
                            </div>
                        </div>

                        {/* Powerups and Control Buttons */}
                        <div className={`mx-auto mb-8 ${showWinnerScreen ? 'hide-on-winner' : ''}`} style={{width: '1400px', position: 'relative'}}>
                            <div className="relative flex items-center justify-center">
                                <div className="flex flex-col gap-2" style={{position: 'absolute', left: 0, zIndex: showImageOverlay ? 50 : 50}}>
                                    <div className="flex gap-6">
                                        {/* Team 1 Point Doubler */}
                                        {(team1Powerups.pointDoubler || team1DoublerActive) && (
                                            <img
                                                src={`${imagePath}powerup-double.png`}
                                                alt="Team 1 Point Doubler"
                                                className={
                                                    team1DoublerActive ? 'powerup-activated' :
                                                    (team1ExtraTimeActive || (doubleDipActive && doubleDipTeam === 1) || (!powerupPhase && showQuestion)) ? 'powerup-used' :
                                                    'powerup-available'
                                                }
                                                style={{width: '84px', height: '84px'}}
                                                onClick={userMode === 'host' ? () => handlePowerup(1, 'pointDoubler') : undefined}
                                            />
                                        )}
                                        {/* Team 1 Extra Time */}
                                        {(team1Powerups.extraTime || team1ExtraTimeActive) && (
                                            <img
                                                src={`${imagePath}powerup-time.png`}
                                                alt="Team 1 Extra Time"
                                                className={
                                                    team1ExtraTimeActive ? 'powerup-activated' :
                                                    (team1DoublerActive || (doubleDipActive && doubleDipTeam === 1) || (!powerupPhase && showQuestion)) ? 'powerup-used' :
                                                    'powerup-available'
                                                }
                                                style={{width: '84px', height: '84px'}}
                                                onClick={userMode === 'host' ? () => handlePowerup(1, 'extraTime') : undefined}
                                            />
                                        )}
                                        {/* Team 1 Double Dip */}
                                        {(team1Powerups.doubleDip || (doubleDipActive && doubleDipTeam === 1) || team1DoubleDipUsed) && (
                                            <img
                                                src={`${imagePath}powerup-dip.png`}
                                                alt="Team 1 Double Dip"
                                                className={
                                                    (doubleDipActive && doubleDipTeam === 1) || team1DoubleDipUsed ? 'powerup-activated' :
                                                    (team1DoublerActive || team1ExtraTimeActive || doubleDipSecondGuess) ? 'powerup-used' :
                                                    'powerup-available'
                                                }
                                                style={{width: '84px', height: '84px'}}
                                                onClick={userMode === 'host' ? () => handlePowerup(1, 'doubleDip') : undefined}
                                            />
                                        )}
                                    </div>
                                </div>

                                {userMode === 'host' && (
                                    <div className="flex gap-4" style={{
                                        position: 'relative',
                                        zIndex: 50,
                                    }}>
                                        
                                        {(currentRound === 7 || currentRound === 14) ? (
                                            (currentRound === 7 ? bonusType : tieBreakerType) === 'closestTo' ? (
                                                // Closest To Buttons
                                                !showQuestion ? (
                                                    <button onClick={handleRevealQuestion} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        REVEAL QUESTION
                                                    </button>
                                                ) : !showBonusAnswer && !timerRunning && team1Time === 30 && team2Time === 30 ? (
                                                    <button onClick={handleStartTimer} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        START TIMER
                                                    </button>
                                                ) : !showBonusAnswer ? (
                                                    <button onClick={handleRevealBonusAnswer} className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        REVEAL ANSWER
                                                    </button>
                                                ) : bonusWinnerAwarded ? (
                                                    <button onClick={handleBonusNext} className="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        NEXT
                                                    </button>
                                                ) : null
                                            ) : (currentRound === 7 ? bonusType : tieBreakerType) === 'bottomsUp' ? (
                                                // Bottoms Up Buttons
                                                bottomsUpPhase === 'question' ? (
                                                    <button onClick={handleBottomsUpReveal} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        REVEAL QUESTION
                                                    </button>
                                                ) : bottomsUpPhase === 'ready' ? (
                                                    <>
                                                        <button onClick={handleBottomsUpStartTimer} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                            START TIMER
                                                        </button>
                                                        <button disabled className="bg-gray-600 text-gray-400 font-bold py-4 px-8 rounded-lg border-4 border-black text-xl cursor-not-allowed">
                                                            NO GUESS
                                                        </button>
                                                    </>
                                                ) : bottomsUpPhase === 'input' ? (
                                                    <>
                                                        <button onClick={handleResetTimer} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                            RESET TIMER
                                                        </button>
                                                        <button onClick={handleBottomsUpNoGuess} className="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                            NO GUESS
                                                        </button>
                                                    </>
                                                ) : bottomsUpPhase === 'between' ? (
                                                    <button onClick={handleBottomsUpNextTurn} className="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        NEXT TURN
                                                    </button>
                                                ) : null
                                            ) : (
                                                // Shootout Buttons
                                                !showQuestion ? (
                                                    <button onClick={handleRevealQuestion} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        REVEAL QUESTION
                                                    </button>
                                                ) : !shootoutBoardRevealed ? (
                                                    <button onClick={handleRevealShootoutBoard} className="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        REVEAL THE BOARD
                                                    </button>
                                                ) : (
                                                    <button onClick={handleShootoutIncorrect} className="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        INCORRECT
                                                    </button>
                                                )
                                            )
                                        ) : (
                                            // Regular Round Buttons
                                            !showCategory ? (
                                                <button onClick={handleRevealCategory} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                    REVEAL CATEGORY
                                                </button>
                                            ) : powerupPhase ? (
                                                <button onClick={() => { setPowerupPhase(false); setPowerupTimer(30); }} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                    LOCK IN POWERUPS
                                                </button>
                                            ) : !showQuestion ? (
                                                <button 
                                                    onClick={handleRevealQuestion}
                                                    className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl"
                                                >
                                                    REVEAL QUESTION
                                                </button>
                                            ) : showQuestion && !showImageOverlay && (currentQuestion === 1 ? currentRoundData?.imageUrl1 : currentRoundData?.imageUrl2) ? (
                                                <button
                                                    onClick={handleRevealImage}
                                                    className="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl"
                                                >
                                                    REVEAL IMAGE
                                                </button>
                                            ) : showAnswer ? (
                                                <button onClick={handleNext} className="bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                    NEXT
                                                </button>
                                            ) : !timerRunning && !showAnswer && ((activeTimer === 1 && team1Time > 0) || (activeTimer === 2 && team2Time > 0)) ? (
                                                <button onClick={handleStartTimer} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                    START TIMER
                                                </button>
                                            ) : (
                                                <>
                                                    <button onClick={handleCorrect} className="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        CORRECT
                                                    </button>
                                                    <button onClick={handleResetTimer} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        RESET TIMER
                                                    </button>
                                                    <button onClick={handleIncorrect} className="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-lg border-4 border-black transition text-xl">
                                                        INCORRECT
                                                    </button>
                                                </>
                                            )
                                        )}
                                    </div>
                                )}

                                <div className="flex flex-col gap-2 items-end" style={{position: 'absolute', right: 0, zIndex: showImageOverlay ? 50 : 50}}>
                                    <div className="flex gap-6">
                                        {/* Team 2 Double Dip */}
                                        {(team2Powerups.doubleDip || (doubleDipActive && doubleDipTeam === 2) || team2DoubleDipUsed) && (
                                            <img
                                                src={`${imagePath}powerup-dip.png`}
                                                alt="Team 2 Double Dip"
                                                className={
                                                    (doubleDipActive && doubleDipTeam === 2) || team2DoubleDipUsed ? 'powerup-activated' :
                                                    (team2DoublerActive || team2ExtraTimeActive || doubleDipSecondGuess) ? 'powerup-used' :
                                                    'powerup-available'
                                                }
                                                style={{width: '84px', height: '84px'}}
                                                onClick={userMode === 'host' ? () => handlePowerup(2, 'doubleDip') : undefined}
                                            />
                                        )}
                                        {/* Team 2 Extra Time */}
                                        {(team2Powerups.extraTime || team2ExtraTimeActive) && (
                                            <img
                                                src={`${imagePath}powerup-time.png`}
                                                alt="Team 2 Extra Time"
                                                className={
                                                    team2ExtraTimeActive ? 'powerup-activated' :
                                                    (team2DoublerActive || (doubleDipActive && doubleDipTeam === 2) || (!powerupPhase && showQuestion)) ? 'powerup-used' :
                                                    'powerup-available'
                                                }
                                                style={{width: '84px', height: '84px'}}
                                                onClick={userMode === 'host' ? () => handlePowerup(2, 'extraTime') : undefined}
                                            />
                                        )}
                                        {/* Team 2 Point Doubler */}
                                        {(team2Powerups.pointDoubler || team2DoublerActive) && (
                                            <img
                                                src={`${imagePath}powerup-double.png`}
                                                alt="Team 2 Point Doubler"
                                                className={
                                                    team2DoublerActive ? 'powerup-activated' :
                                                    (team2ExtraTimeActive || (doubleDipActive && doubleDipTeam === 2) || (!powerupPhase && showQuestion)) ? 'powerup-used' :
                                                    'powerup-available'
                                                }
                                                style={{width: '84px', height: '84px'}}
                                                onClick={userMode === 'host' ? () => handlePowerup(2, 'pointDoubler') : undefined}
                                            />
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Round Progress */}
                        <div className={`flex justify-center gap-2 ${showWinnerScreen ? 'hide-on-winner' : ''}`}>
                            {[1, 2, 3, 4, 5, 6].map((round) => (
                                <div
                                    key={round}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center border-4 border-black font-bold text-lg ${
                                        round === currentRound ? 'bg-yellow-400 text-black' : round < currentRound ? 'bg-green-500 text-white' : 'bg-gray-600 text-white'
                                    }`}
                                >
                                    {round}
                                </div>
                            ))}
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center border-4 border-black font-bold text-sm ${
                                currentRound === 7 || currentRound === 14 ? 'bg-yellow-400 text-black' : currentRound > 7 ? 'bg-green-500 text-white' : 'bg-purple-500 text-white'
                            }`}>
                                {currentRound === 14 ? 'TB' : 'B'}
                            </div>
                            {[8, 9, 10, 11, 12, 13].map((round) => (
                                <div
                                    key={round}
                                    className={`w-12 h-12 rounded-full flex items-center justify-center border-4 border-black font-bold text-lg ${
                                        round === currentRound ? 'bg-yellow-400 text-black' : round < currentRound ? 'bg-green-500 text-white' : 'bg-gray-600 text-white'
                                    }`}
                                >
                                    {round - 1}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
                {showImageOverlay && ReactDOM.createPortal(
                    <div style={{
                        position: 'fixed',
                        inset: 0,
                        backgroundColor: 'rgba(0,0,0,0.88)',
                        zIndex: 44,
                        pointerEvents: 'none',
                        animation: 'imageFadeIn 0.5s ease-in forwards'
                    }} />,
                    document.body
                )}
                </>
            );
        }

        ReactDOM.render(<TriviaGame />, document.getElementById('root'));
    </script>
</body>
</html>
