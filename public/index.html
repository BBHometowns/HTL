<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hometown Trivia League Host</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        html, body, #root {
            width: 100%;
            height: 100%;
        }
        .powerup-inactive {
            filter: grayscale(100%);
            cursor: not-allowed;
            opacity: 0.6;
        }
        .powerup-active {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .powerup-active:hover {
            transform: scale(1.1);
        }
        .team-logo-transition {
            transition: all 0.8s ease-in-out;
        }
        .team-glow {
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.8)) drop-shadow(0 0 40px rgba(251, 191, 36, 0.6));
        }
        .team-inactive {
            filter: grayscale(50%);
        }
        .score-text {
            -webkit-text-stroke: 6px white;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .slide-in-left {
            animation: slideInLeft 1s ease-out forwards;
        }
        
        .slide-in-right {
            animation: slideInRight 1s ease-out forwards;
        }
        
        .versus-split-left {
            animation: versusSplitLeft 1s ease-out forwards;
        }
        @keyframes versusSplitLeft {
            from {
                clip-path: polygon(50% 0%, 50% 100%, 50% 100%, 50% 0%);
            }
            to {
                clip-path: polygon(0% 0%, 0% 100%, 50% 100%, 50% 0%);
            }
        }
        
        .versus-split-right {
            animation: versusSplitRight 1s ease-out forwards;
        }
        @keyframes versusSplitRight {
            from {
                clip-path: polygon(50% 0%, 50% 100%, 50% 100%, 50% 0%);
            }
            to {
                clip-path: polygon(50% 0%, 50% 100%, 100% 100%, 100% 0%);
            }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-10px, -10px); }
            20%, 40%, 60%, 80% { transform: translate(10px, 10px); }
        }

        .shake-1 {
            animation: shake1 0.5s ease-in-out;
        }
        @keyframes shake1 {
            0%, 100% { transform: translateY(-50%) translate(0, 0) rotate(0deg); }
            10% { transform: translateY(-50%) translate(-8px, 5px) rotate(-2deg); }
            20% { transform: translateY(-50%) translate(7px, -6px) rotate(1deg); }
            30% { transform: translateY(-50%) translate(-6px, 8px) rotate(-1deg); }
            40% { transform: translateY(-50%) translate(9px, -5px) rotate(2deg); }
            50% { transform: translateY(-50%) translate(-7px, 7px) rotate(-2deg); }
            60% { transform: translateY(-50%) translate(6px, -8px) rotate(1deg); }
            70% { transform: translateY(-50%) translate(-9px, 6px) rotate(-1deg); }
            80% { transform: translateY(-50%) translate(8px, -7px) rotate(2deg); }
            90% { transform: translateY(-50%) translate(-5px, 9px) rotate(-2deg); }
        }
        
        .shake-2 {
            animation: shake2 0.5s ease-in-out;
        }
        @keyframes shake2 {
            0%, 100% { transform: translateY(-50%) translate(0, 0) rotate(0deg); }
            10% { transform: translateY(-50%) translate(6px, -7px) rotate(1deg); }
            20% { transform: translateY(-50%) translate(-8px, 6px) rotate(-2deg); }
            30% { transform: translateY(-50%) translate(7px, -8px) rotate(2deg); }
            40% { transform: translateY(-50%) translate(-6px, 9px) rotate(-1deg); }
            50% { transform: translateY(-50%) translate(9px, -6px) rotate(1deg); }
            60% { transform: translateY(-50%) translate(-7px, 8px) rotate(-2deg); }
            70% { transform: translateY(-50%) translate(8px, -9px) rotate(2deg); }
            80% { transform: translateY(-50%) translate(-9px, 7px) rotate(-1deg); }
            90% { transform: translateY(-50%) translate(7px, -8px) rotate(1deg); }
        }
        
        .fade-out {
            animation: fadeOut 1s ease-out forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        .fade-in-game {
            animation: fadeInGame 1s ease-in forwards;
        }
        @keyframes fadeInGame {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .team-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .team-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .team-card-selected {
            border: 4px solid #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            appearance: textfield;
        }

        .timer-text {
            -webkit-text-stroke: 2px black;
        }
        body, input, button, textarea, select, p, h1, h2, h3, h4, h5, h6, div, span {
            text-transform: uppercase;
        }
        .image-overlay-fade {
            animation: imageFadeIn 0.5s ease-in forwards;
        }
        @keyframes imageFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes bottomsUpPulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }
        @keyframes flyToScoreLeft {
            0% { 
                transform: translateX(-50%) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translateX(calc(-50% - 250px)) translateY(-800px) scale(0.05); 
                opacity: 0; 
            }
        }
        @keyframes flyToScoreRight {
            0% { 
                transform: translateX(-50%) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translateX(calc(-50% + 250px)) translateY(-800px) scale(0.05); 
                opacity: 0; 
            }
        }
        @keyframes timerFlashWhite {
            0% { background-color: transparent; border-color: #7d3ad4; color: inherit; }
            50% { background-color: white; border-color: white; color: white; }
            100% { background-color: transparent; border-color: #7d3ad4; color: inherit; }
        }
        .timer-flash {
            animation: timerFlashWhite 0.5s ease-in-out;
        }
        @keyframes spinVertical {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(360deg); }
        }
        .second-guess-spin {
            animation: spinVertical 0.6s ease-in-out;
            display: inline-block;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
        }
        @keyframes flipOutY {
            0% { transform: perspective(400px) rotateY(0deg); opacity: 1; }
            100% { transform: perspective(400px) rotateY(-90deg); opacity: 0; }
        }
        @keyframes flipInY {
            0% { transform: perspective(400px) rotateY(90deg); opacity: 0; }
            100% { transform: perspective(400px) rotateY(0deg); opacity: 1; }
        }
        @keyframes countdownFadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        .countdown-fade-out {
            animation: countdownFadeOut 2s ease-out forwards;
        }
        @keyframes whiteFlash {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .white-flash {
            animation: whiteFlash 2s ease-out forwards;
        }
        .flip-out {
            animation: flipOutY 0.15s ease-in forwards;
        }
        .flip-in {
            animation: flipInY 0.15s ease-out forwards;
        }
        .countdown-fade-out {
            animation: countdownFadeOut 2s ease-out forwards;
        }
        @keyframes backgroundFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .background-fade-in {
            animation: backgroundFadeIn 2s ease-in forwards;
        }
        @keyframes backgroundFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .powerup-available {
            filter: none;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.5s ease-out, filter 0.3s ease;
        }
        .powerup-activated {
            filter: hue-rotate(120deg);
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.5s ease-out, filter 0.3s ease;
        }
        .powerup-used {
            filter: grayscale(100%);
            opacity: 0.35;
            cursor: not-allowed;
            transition: opacity 0.5s ease-out, filter 0.3s ease;
        }
        .powerup-hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function TriviaGame() {
            const [team1Score, setTeam1Score] = useState(0);
            const [team2Score, setTeam2Score] = useState(0);
            const [currentRound, setCurrentRound] = useState(1);
            const [currentQuestion, setCurrentQuestion] = useState(1);
            const [showCategory, setShowCategory] = useState(false);
            const [showQuestion, setShowQuestion] = useState(false);
            const [showAnswer, setShowAnswer] = useState(false);
            const [activeTeam, setActiveTeam] = useState(1);
            const [stealAttempted, setStealAttempted] = useState(false);
            
            // Timer states
            const [team1Time, setTeam1Time] = useState(30);
            const [team2Time, setTeam2Time] = useState(15);
            const [timerRunning, setTimerRunning] = useState(false);
            const [activeTimer, setActiveTimer] = useState(1);
            
            const questionTextRef = useRef(null);
            const answerTextRef = useRef(null);
            
            // Powerups state
            const [team1Powerups, setTeam1Powerups] = useState({
                extraTime: true,
                pointDoubler: true,
                doubleDip: true
            });
            
            const [team2Powerups, setTeam2Powerups] = useState({
                extraTime: true,
                pointDoubler: true,
                doubleDip: true
            });

            const [currentPointValue, setCurrentPointValue] = useState(1);

            const [powerupPhase, setPowerupPhase] = useState(false);
            const [powerupTimer, setPowerupTimer] = useState(30);
            const [team1DoublerActive, setTeam1DoublerActive] = useState(false);
            const [team2DoublerActive, setTeam2DoublerActive] = useState(false);
            const [team1ExtraTimeActive, setTeam1ExtraTimeActive] = useState(false);
            const [team2ExtraTimeActive, setTeam2ExtraTimeActive] = useState(false);
            
            // Team selection states
            const [gameStarted, setGameStarted] = useState(false);
            const [selectedTeam1, setSelectedTeam1] = useState(null);
            const [selectedTeam2, setSelectedTeam2] = useState(null);
            const [showIntro, setShowIntro] = useState(false);
            const [introStep, setIntroStep] = useState(0);
            const [teamsConfirmed, setTeamsConfirmed] = useState(false);

            // Admin and match selection states
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [adminAuthenticated, setAdminAuthenticated] = useState(false);
            const [selectedMatch, setSelectedMatch] = useState(null);

            // Bonus round states
            const [bonusType, setBonusType] = useState('closestTo'); // 'closestTo' or 'shootout'
            const [bonusScore1, setBonusScore1] = useState(0);
            const [bonusScore2, setBonusScore2] = useState(0);
            const [bonusQuestionIndex, setBonusQuestionIndex] = useState(0);
            const [team1Guess, setTeam1Guess] = useState('');
            const [team2Guess, setTeam2Guess] = useState('');
            const [team1GuessSubmitted, setTeam1GuessSubmitted] = useState(false);
            const [team2GuessSubmitted, setTeam2GuessSubmitted] = useState(false);
            const [showBonusAnswer, setShowBonusAnswer] = useState(false);
            const [bonusWinnerAwarded, setBonusWinnerAwarded] = useState(false);

            // Shootout bonus states
            const [shootoutBoardRevealed, setShootoutBoardRevealed] = useState(false);
            const [shootoutRevealedAnswers, setShootoutRevealedAnswers] = useState([]);
            const [shootoutTurnCount, setShootoutTurnCount] = useState(0); // How many turns each team has taken
            const [shootoutActiveTeam, setShootoutActiveTeam] = useState(1); // Which team is currently guessing
            const [shootoutSuddenDeath, setShootoutSuddenDeath] = useState(false);
            const [shootoutShuffledAnswers, setShootoutShuffledAnswers] = useState([]);
            const [isTieBreaker, setIsTieBreaker] = useState(false);
            const [tieBreakerType, setTieBreakerType] = useState(null);
            const [showWinnerScreen, setShowWinnerScreen] = useState(false);
            const [winnerTeam, setWinnerTeam] = useState(null);

            // Stream profile states
            const [userMode, setUserMode] = useState(null); // 'host' or 'stream'
            const [roomCode, setRoomCode] = useState('');
            const [shouldConnect, setShouldConnect] = useState(false);
            const [isConnected, setIsConnected] = useState(false);
            const [socket, setSocket] = useState(null);
            const [showRoomSetup, setShowRoomSetup] = useState(false);
            const [waitingDots, setWaitingDots] = useState('.');
            const [adminStep, setAdminStep] = useState(1);
            const [showRoomCheckModal, setShowRoomCheckModal] = useState(false);
            const [roomCheckData, setRoomCheckData] = useState(null);
            const [roomCheckLoading, setRoomCheckLoading] = useState(false);
            const [isResuming, setIsResuming] = useState(false);
            const [selectedBonusType, setSelectedBonusType] = useState(null);
            const [selectedTiebreakerType, setSelectedTiebreakerType] = useState(null);

            // Bottoms Up bonus round states
            const [bottomsUpQuestions, setBottomsUpQuestions] = useState([]);
            const [bottomsUpQuestion, setBottomsUpQuestion] = useState(null);
            const [bottomsUpTurnNumber, setBottomsUpTurnNumber] = useState(1);
            const [bottomsUpActiveTeam, setBottomsUpActiveTeam] = useState(1);
            const [bottomsUpUsedAnswers, setBottomsUpUsedAnswers] = useState([]);
            const [bottomsUpHostInput, setBottomsUpHostInput] = useState('');
            const [bottomsUpModalMatches, setBottomsUpModalMatches] = useState([]);
            const [bottomsUpShowModal, setBottomsUpShowModal] = useState(false);
            const [bottomsUpConfirmedAnswer, setBottomsUpConfirmedAnswer] = useState(null);
            const [bottomsUpAnimating, setBottomsUpAnimating] = useState(false);
            const [bottomsUpAnimationValue, setBottomsUpAnimationValue] = useState(0);
            const [bottomsUpPhase, setBottomsUpPhase] = useState('question');
            const [bottomsUpFlyingScore, setBottomsUpFlyingScore] = useState(false);
            const [bottomsUpShowAnswer, setBottomsUpShowAnswer] = useState(false);
            const [bottomsUpGlowing, setBottomsUpGlowing] = useState(false);
            const [showImageOverlay, setShowImageOverlay] = useState(false);
            const [recapImagePopup, setRecapImagePopup] = useState(null);
            const [currentImageUrl, setCurrentImageUrl] = useState(null);
            const [timersExpanded, setTimersExpanded] = useState(false);
            const [imageLoadError, setImageLoadError] = useState(false);
            const [doubleDipActive, setDoubleDipActive] = useState(false);
            const [doubleDipTeam, setDoubleDipTeam] = useState(null);
            const [doubleDipSecondGuess, setDoubleDipSecondGuess] = useState(false);
            const [team1DoubleDipUsed, setTeam1DoubleDipUsed] = useState(false);
            const [team2DoubleDipUsed, setTeam2DoubleDipUsed] = useState(false);
            const [team1ExtraTimeUsed, setTeam1ExtraTimeUsed] = useState(false);
            const [team2ExtraTimeUsed, setTeam2ExtraTimeUsed] = useState(false);
            const [showCountdown, setShowCountdown] = useState(false);
            const [matchStartTimestamp, setMatchStartTimestamp] = useState(null);
            const [countdownNumber, setCountdownNumber] = useState(10);
            const [countdownFlipping, setCountdownFlipping] = useState(false);
            const [countdownFading, setCountdownFading] = useState(false);
            const [backgroundFading, setBackgroundFading] = useState(false);
            const [showBlackScreen, setShowBlackScreen] = useState(false);
            const [whiteFading, setWhiteFading] = useState(false);
            const [answerTextPosition, setAnswerTextPosition] = useState(null);

            // Google Sheets data
            const [sheetsMatches, setSheetsMatches] = useState([]);
            const [closestToQuestions, setClosestToQuestions] = useState([]);
            const [shootoutQuestions, setShootoutQuestions] = useState([]);
            const [sheetsLoading, setSheetsLoading] = useState(true);
            const [sheetsError, setSheetsError] = useState(null);
            
            // All 16 teams data
            const teamsData = [
                { id: 1, name: "Bear Essentials", logo: "Bear Essentials.png", color: "#FA8F18" },
                { id: 2, name: "Bucket We Ball", logo: "Bucket We Ball.png", color: "#FD7713" },
                { id: 3, name: "Edgewood High School", logo: "Edgewood High School.png", color: "#FCA8CC" },
                { id: 4, name: "Gecko Chamber", logo: "Gecko Chamber.png", color: "#CFEC2D" },
                { id: 5, name: "Identity Thieves", logo: "Identity Thieves.png", color: "#504C5D" },
                { id: 6, name: "Nerd World Order", logo: "NerdWorldOrder.png", color: "#953B0E" },
                { id: 7, name: "New Directions", logo: "New Directions.png", color: "#EE2634" },
                { id: 8, name: "Old Ladies", logo: "Old Ladies.png", color: "#92AEAC" },
                { id: 9, name: "Placeholder", logo: "Placeholder.png", color: "#0046AC" },
                { id: 10, name: "Purple Porpoises", logo: "Purple Porpoises.png", color: "#E5D6F4" },
                { id: 11, name: "Rubber Rims", logo: "Rubber Rims.png", color: "#D82214"},
                { id: 12, name: "Sims Family Values", logo: "Sims Family Values.png", color: "#8145D3" },
                { id: 13, name: "Southwest Hairlines", logo: "SouthwestHairlines.png", color: "#F9B621" },
                { id: 14, name: "The Weathermen", logo: "Weathermen.png", color: "#00BCEE" },
                { id: 15, name: "Too Thawt To Handle", logo: "Too Thawt To Handle.png", color: "#AAE5FD"},
                { id: 16, name: "Trivia Rodrigo", logo: "Trivia Rodrigo.png", color: "#BC8EEC"} 
            ];

            const imagePath = 'https://raw.githubusercontent.com/BBHometowns/HTL/main/Graphics/';
            const audioPath = '/';
            const SHEETS_API_KEY = 'AIzaSyBLbJVMfP7vCU0ccKwVcwNBJPOlN8BAFvI';
            const SHEETS_ID = '1EN3FSORt1A0TKcHcnaz62CDF0rdGABVGG_2IuYEja7o';
            const firebaseConfig = {
                databaseURL: "https://hometowns-trivia-league-default-rtdb.firebaseio.com/"
            };
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const displayRound = currentRound === 7 ? 'BONUS' : currentRound > 7 ? currentRound - 1 : currentRound;

            // Calculate timer colors with gradients
            const getTimerColor = (time) => {
                let color;
                if (time >= 30) {
                    const ratio = Math.min((time - 30) / 15, 1);
                    const r = Math.round(255 - (255 - 34) * ratio);
                    const g = Math.round(255 - (255 - 197) * ratio);
                    const b = Math.round(255 - (255 - 94) * ratio);
                    color = `rgb(${r}, ${g}, ${b})`;
                } else if (time >= 15) {
                    const ratio = (time - 15) / 15;
                    const r = 255;
                    const g = Math.round(193 + (255 - 193) * ratio);
                    const b = Math.round(7 + (255 - 7) * ratio);
                    color = `rgb(${r}, ${g}, ${b})`;
                } else {
                    const ratio = time / 15;
                    const r = 239;
                    const g = Math.round(68 + (193 - 68) * ratio);
                    const b = Math.round(68 + (7 - 68) * ratio);
                    color = `rgb(${r}, ${g}, ${b})`;
                }
                return color;
            };
            
            const timer1Value = (currentRound === 7 || currentRound === 14) ? 
                ((currentRound === 7 ? bonusType : tieBreakerType) === 'shootout' ? team1Time : 
                (currentRound === 7 ? bonusType : tieBreakerType) === 'bottomsUp' ? team1Time :
                Math.max(team1Time, team2Time)) : 
                powerupPhase ? powerupTimer : team1Time;

            const timer2Value = (currentRound === 7 || currentRound === 14) ? 
                ((currentRound === 7 ? bonusType : tieBreakerType) === 'shootout' ? team2Time : 
                (currentRound === 7 ? bonusType : tieBreakerType) === 'bottomsUp' ? team2Time :
                Math.max(team1Time, team2Time)) : 
                powerupPhase ? powerupTimer : team2Time;
            
            const timer1Color = getTimerColor(timer1Value);
            const timer2Color = getTimerColor(timer2Value);

            // Measure answer text position for image overlay portal
            useEffect(() => {
                if (showImageOverlay && answerTextRef.current) {
                    const rect = answerTextRef.current.getBoundingClientRect();
                    setAnswerTextPosition({
                        top: rect.top,
                        left: rect.left,
                        width: rect.width
                    });
                } else {
                    setAnswerTextPosition(null);
                }
            }, [showAnswer, showImageOverlay]);

            // Load Google Sheets data on page load
            useEffect(() => {
                fetchSheetsData();
            }, []);

            // Auto-resize text to fit container
            useEffect(() => {
                if (showQuestion && questionTextRef.current) {
                    const container = questionTextRef.current.parentElement;
                    const containerHeight = container.clientHeight;
                    const containerWidth = container.clientWidth - 40;
                    
                    let fontSize = 40;
                    questionTextRef.current.style.fontSize = fontSize + 'px';
                    
                    while ((questionTextRef.current.scrollHeight > containerHeight || 
                            questionTextRef.current.scrollWidth > containerWidth) && 
                           fontSize > 18) {
                        fontSize -= 1;
                        questionTextRef.current.style.fontSize = fontSize + 'px';
                    }
                }
            }, [showQuestion, currentQuestion, currentRound]);

            // Timer countdown
            useEffect(() => {
                // ONLY run timers on HOST side
                if (userMode !== 'host') return;
                
                let interval;
                if (timerRunning) {
                    interval = setInterval(() => {
                        if (currentRound === 7 || currentRound === 14) {
                            const activeBonusType = currentRound === 7 ? bonusType : tieBreakerType;
                            if (activeBonusType === 'closestTo') {
                                // For Closest To bonus round, both timers count down together
                                setTeam1Time(prev => {
                                    if (prev <= 1) {
                                        setTimerRunning(false);
                                        return 0;
                                    }
                                    return prev - 1;
                                });
                                setTeam2Time(prev => {
                                    if (prev <= 1) {
                                        setTimerRunning(false);
                                        return 0;
                                    }
                                    return prev - 1;
                                });
                            } else if (activeBonusType === 'shootout') {
                                // For Shootout, only active team's timer counts down
                                if (shootoutActiveTeam === 1) {
                                    setTeam1Time(prev => {
                                        if (prev <= 1) {
                                            setTimerRunning(false);
                                            return 0;
                                        }
                                        return prev - 1;
                                    });
                                } else {
                                    setTeam2Time(prev => {
                                        if (prev <= 1) {
                                            setTimerRunning(false);
                                            return 0;
                                        }
                                        return prev - 1;
                                    });
                                }
                            } else if (activeBonusType === 'bottomsUp') {

            // Fetch all data from Google Sheets
            const fetchSheetsData = async () => {
                setSheetsLoading(true);

                try {
                    // First, get the list of all tabs (sheets) in the spreadsheet
                    const metaUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}?key=${SHEETS_API_KEY}`;
                    const metaResponse = await fetch(metaUrl);
                    
                    if (!metaResponse.ok) {
                        throw new Error('Failed to connect to Google Sheets. Check your API key and Sheet ID.');
                    }
                    
                    const metaData = await metaResponse.json();
                    const allSheets = metaData.sheets
                        .filter(s => !s.properties.hidden)
                        .map(s => s.properties.title);
                    
                    // Separate match tabs from bonus tabs
                    const matchTabs = allSheets.filter(name => name.toUpperCase().startsWith('MATCH'));
                    const closestToTab = allSheets.find(name => name.toUpperCase() === 'CLOSEST TO');
                    const shootoutTab = allSheets.find(name => name.toUpperCase() === 'SHOOTOUT');
                    const bottomsUpTab = allSheets.find(name => name.toUpperCase() === 'BOTTOMS UP');
                    const hasClosestTo = !!closestToTab;
                    const hasShootout = !!shootoutTab;
                    const hasBottomsUp = !!bottomsUpTab;
                    
                    // --- LOAD MATCH TABS ---
                    const loadedMatches = [];
                    
                    for (const tabName of matchTabs) {
                        const matchName = tabName.substring(5).trim(); // Remove "MATCH" prefix
                        
                        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(tabName)}!A2:F25?key=${SHEETS_API_KEY}`;
                        const response = await fetch(url);
                        const data = await response.json();
                        const rows = data.values || [];
                        
                        // Parse rows into rounds
                        const rounds = [];
                        for (let i = 0; i < rows.length; i += 2) {
                            const row1 = rows[i] || [];
                            const row2 = rows[i + 1] || [];
                            
                            if (row1.length < 5) continue; // Skip incomplete rows
                            
                            rounds.push({
                                category: row1[1] || '',      // Column B
                                question1: row1[3] || '',     // Column D
                                answer1: row1[4] || '',       // Column E
                                imageUrl1: row1[5] || null,   // Column F (optional image for Q1)
                                question2: row2[3] || '',     // Column D
                                answer2: row2[4] || '',       // Column E
                                imageUrl2: row2[5] || null    // Column F (optional image for Q2)
                            });
                        }
                        
                        loadedMatches.push({
                            id: tabName,
                            name: matchName,
                            rounds: rounds
                        });
                    }
                    
                    setSheetsMatches(loadedMatches);
                    
                    // --- LOAD CLOSEST TO TAB ---
                    if (hasClosestTo) {
                        const ctUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(closestToTab)}!A2:C1000?key=${SHEETS_API_KEY}`;
                        const ctResponse = await fetch(ctUrl);
                        const ctData = await ctResponse.json();
                        const ctRows = ctData.values || [];
                        
                        // Skip Row 1 (labels), load all questions
                        const questions = ctRows
                            .filter(row => row[0] && row[1]) // Must have question and answer
                            .map((row, index) => ({
                                question: row[0],
                                answer: parseFloat(row[1]),
                                lastUsed: row[2] || '',
                                rowIndex: index + 2 // +2 because row 1 is the header, data starts at row 2
                            }));
                        
                        // Shuffle so they come out in random order each game
                        const shuffled = questions.sort(() => Math.random() - 0.5);
                        setClosestToQuestions(shuffled);
                    }
                    
                    // --- LOAD SHOOTOUT TAB ---
                    if (hasShootout) {
                        const soUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(shootoutTab)}!A1:Z200?key=${SHEETS_API_KEY}`;
                        const soResponse = await fetch(soUrl);
                        const soData = await soResponse.json();
                        const soRows = soData.values || [];
                        
                        if (soRows.length > 0) {
                            const questions = [];
                            
                            // Column A has row labels, data starts at column B (index 1)
                            // Each column from B onward is one question
                            const numCols = soRows[0]?.length || 0;

                            for (let col = 1; col < numCols; col++) {
                                const longQuestion = soRows[0]?.[col] || '';   // Row 1, this column
                                const lastUsed = soRows[1]?.[col] || '';       // Row 2, this column
                                const shortQuestion = soRows[2]?.[col] || '';  // Row 3, this column
                                
                                // Answers start at Row 4 (index 3)
                                const answers = [];
                                for (let row = 3; row < soRows.length; row++) {
                                    const answer = soRows[row]?.[col];
                                    if (answer && answer.trim() !== '') {
                                        answers.push(answer.trim());
                                    }
                                }
                                
                                if (longQuestion && answers.length > 0) {
                                    questions.push({
                                        colIndex: col,
                                        longQuestion,
                                        shortQuestion,
                                        lastUsed,
                                        answers
                                    });
                                }

                            setShootoutQuestions(questions);
                        }

                        const buResponse = await fetch(buUrl);

                        const buRows = buData.values || [];
                        
                        if (buRows.length > 0) {

                            // Each column is one question

                            for (let col = 1; col < numCols; col++) {
                                const questionText = buRows[0]?.[col] || '';
                                const lastUsed = buRows[1]?.[col] || '';

                        }
                    }

            // Renders question text with [bracketed] host-only content
            // Host sees bracketed content in cyan italic, Stream sees it removed
            const renderQuestionText = (text, isHost) => {
                if (!text) return '';
                if (!text.includes('[')) return text;
                
                // Split on bracket patterns
                const parts = text.split(/(\[[^\]]*\])/g);
                
                if (!isHost) {
                    // Stream: remove bracketed sections entirely
                    return parts
                        .filter(part => !part.startsWith('['))
                        .join('')
                        .replace(/\s+/g, ' ')
                        .trim();
                }
                
                // Host: render bracketed sections in cyan italic
                return parts.map((part, index) => {
                    if (part.startsWith('[') && part.endsWith(']')) {
                        return (
                            <span key={index} style={{
                                display: 'block',
                                color: '#22d3ee',
                                fontStyle: 'italic',
                                marginTop: '2em'
                            }}>
                                {part.slice(1, -1)}
                            </span>

                    return part;

            // Converts a Google Drive sharing URL to a direct image URL
            const convertDriveUrl = (url) => {
                if (!url) return null;

                if (url.includes('lh3.googleusercontent.com')) return url;
                
                // Extract the file ID from a standard sharing URL
                // Format: https://drive.google.com/file/d/FILE_ID/view
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;

                // If we can't parse it, return the original URL and hope for the best
                return url;

                    // Reset active team's timer to 10 seconds

                    } else if (currentRound === 13) {

            const handlePowerup = (team, powerup) => {

                if (team === 1) {

                        if (!team1Powerups.pointDoubler && !team1DoublerActive) return; // Already used
                        if (team1DoublerActive) {

                            setTeam1DoublerActive(false);

                        } else if (team1Powerups.pointDoubler && powerupPhase && !team1ExtraTimeActive) {

                window._countdownStarted = true;
                setTimeout(() => { window._countdownStarted = false; }, 100);
                
                // Reset gameStarted so Stream doesn't jump to game screen
                setGameStarted(false);
                // Show countdown screen immediately
                setShowCountdown(true);
                setCountdownNumber(null);
                setCountdownFlipping(false);
                setTimeout(() => broadcastGameState(), 100);
                
                // Run the countdown sequence (visual only - no audio on Host)
                const runCountdown = (startNum) => {
                    for (let i = 0; i < startNum; i++) {
                        const num = startNum - i;
                        const timeMs = i * 1000;
                        
                        setTimeout(() => {
                            setCountdownFlipping(false);
                            setCountdownNumber(num);
                            setTimeout(() => broadcastGameState(), 50);
                        }, timeMs);
                        
                        setTimeout(() => {
                            setCountdownFlipping(true);
                        }, timeMs + 850);
                    }
                    
                    // After last number, start white flash
                    setTimeout(() => {
                        setCountdownFading(true);
                        setTimeout(() => broadcastGameState(), 50);
                        setTimeout(() => {
                            setWhiteFading(true);
                            setShowCountdown(false);
                            setCountdownFading(false);
                            setBackgroundFading(true);
                            setShowIntro(true);
                            setTimeout(() => broadcastGameState(), 50);
                            // White fades out after 1.5 seconds
                            setTimeout(() => {
                                setWhiteFading(false);
                                setTimeout(() => broadcastGameState(), 200);
                            }, 1500);
                            // Background fully visible after 3.5 seconds
                            setTimeout(() => {
                                setBackgroundFading(false);
                                setTimeout(() => broadcastGameState(), 50);
                            }, 3500);
                        }, 2000);
                    }, startNum * 1000);
                };
                
                // Wait 2.5 seconds for audio lead-in, then start visual countdown from 10
                setTimeout(() => {
                    // Write timestamp exactly when "10" appears

            // Broadcast game state to all streams

            const handleAdminLogin = () => {

            const handleMatchSelection = (match) => {

            const handleSubmitGuess = (team) => {
                if (team === 1) {

                    setTeam2GuessSubmitted(true);
                }
            };
            
            const handleRevealBonusAnswer = () => {
                setShowBonusAnswer(true);
                
                // Calculate winner after 3 second delay
                setTimeout(() => {
                    const currentQuestion = closestToQuestions[bonusQuestionIndex];
                    const correctAnswer = currentQuestion.answer;
                    const guess1 = parseInt(team1Guess) || 0;
                    const guess2 = parseInt(team2Guess) || 0;
                    
                    // If both teams have same answer, it's a tie - no points
                    if (guess1 === guess2) {
                        // No points awarded
                    } else {
                        const diff1 = Math.abs(correctAnswer - guess1);
                        const diff2 = Math.abs(correctAnswer - guess2);
                        
                        // Check for exact answers (worth 2 points)
                        if (guess1 === correctAnswer) {
                            setBonusScore1(bonusScore1 + 2);
                        } else if (guess2 === correctAnswer) {
                            setBonusScore2(bonusScore2 + 2);
                        } else {
                            // Award 1 point to closer team
                            if (diff1 < diff2) {
                                setBonusScore1(bonusScore1 + 1);
                            } else if (diff2 < diff1) {
                                setBonusScore2(bonusScore2 + 1);
                            }
                            // If tied distance, no one gets a point
                        }
                    }
                    
                    setBonusWinnerAwarded(true);
                }, 3000);
            };
            
            const handleBonusNext = () => {
                // Check if someone won (first to 3 points)
                if (bonusScore1 >= 3 || bonusScore2 >= 3) {

                    if (currentRound === 14) {

                        if (bonusScore1 >= 3) {

                            setTeam2Score(team2Score + 1);

                        const finalScore2 = team2Score + (bonusScore2 >= 3 ? 1 : 0);
                        const winner = finalScore1 > finalScore2 ? selectedTeam1 : selectedTeam2;
                        
                        setTimeout(() => {
                            setWinnerTeam(winner);
                            setShowWinnerScreen(true);

                        setBonusScore2(0);
                        setBonusQuestionIndex(0);
                        setIsTieBreaker(false);
                        setTieBreakerType(null);

                    // Move to next round (regular bonus)

                    setActiveTeam(1);
                    setActiveTimer(1);
                    setTeam1Time(30);
                    setTeam2Time(15);
                    setShowCategory(false);
                    setShowQuestion(false);
                    
                    // Reset bonus states
                    setBonusScore1(0);
                    setBonusScore2(0);
                    setBonusQuestionIndex(0);

                // Reset question states

                setShowBonusAnswer(false);
                setBonusWinnerAwarded(false);
                setTeam1Guess('');
                setTeam2Guess('');
                setTeam1GuessSubmitted(false);
                setTeam2GuessSubmitted(false);
                setTimerRunning(false);
                setShowQuestion(false);

                setTeam1Time(30);
                setTeam2Time(30);

            // Handles the host clicking "Reveal Image" during a question with an image
            const handleRevealImage = () => {

                const imageUrl = currentQuestion === 1 
                    ? currentRoundData?.imageUrl1 
                    : currentRoundData?.imageUrl2;

                setCurrentImageUrl(directUrl);

                setImageLoadError(false);
                
                // Slide the timer boxes outward immediately

            const handleBottomsUpReveal = () => {

                setBottomsUpPhase('ready');
                // Mark this question as used in Google Sheets
                const activeQ = bottomsUpQuestion;

                }

            const handleBottomsUpStartTimer = () => {

                    setActiveTimer(2);

                setTimerRunning(true);
                setBottomsUpPhase('input');
                setBottomsUpHostInput('');

            const handleBottomsUpSearch = () => {
                console.log('handleBottomsUpSearch called, input:', bottomsUpHostInput, 'question:', bottomsUpQuestion?.answers?.length, 'answers');
                if (!bottomsUpHostInput.trim() || !bottomsUpQuestion) return;
                
                const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
                const typedNormalized = normalize(bottomsUpHostInput);
                
                const matches = bottomsUpQuestion.answers
                    .filter(answer => {
                        const answerNormalized = normalize(answer.text);
                        return answerNormalized.includes(typedNormalized) || 
                            typedNormalized.includes(answerNormalized);
                    })
                    .map(answer => ({
                        ...answer,
                        isExact: normalize(answer.text) === typedNormalized,
                        alreadyUsed: bottomsUpUsedAnswers.includes(answer.pointValue)
                    }));
                
                setBottomsUpModalMatches(matches);
                setTimerRunning(false);
                setBottomsUpPhase('modal');
                setBottomsUpShowModal(true);
            };

            const handleBottomsUpConfirm = (answer) => {
                setBottomsUpConfirmedAnswer({...answer, text: answer.text.toUpperCase()});
                setBottomsUpUsedAnswers(prev => [...prev, answer.pointValue]);
                setBottomsUpShowModal(false);
                setTimerRunning(false);
                setBottomsUpPhase('animating');
                runBottomsUpAnimation(answer.pointValue, true, bottomsUpActiveTeam);
            };

            const handleBottomsUpNotOnList = () => {

                setBottomsUpShowModal(false);
                setTimerRunning(false);
                setBottomsUpPhase('animating');
                runBottomsUpAnimation(0, false, bottomsUpActiveTeam);
            };

            const handleBottomsUpNoGuess = () => {
                setTimerRunning(false);
                setBottomsUpHostInput('');
                setBottomsUpConfirmedAnswer(null);
                
                // Advance to next team/turn
                if (bottomsUpActiveTeam === 1) {
                    // Move to Team 2's turn (same turn number)
                    setBottomsUpActiveTeam(2);
                    setActiveTimer(2);
                } else {
                    // Team 2 just went - check if round is over
                    const nextTurn = bottomsUpTurnNumber + 1;
                    if (bottomsUpTurnNumber >= 5) {
                        // Check for tie
                        if (bonusScore1 !== bonusScore2) {
                            handleBottomsUpComplete();
                            return;
                        }
                        // Tied - continue to next turn
                    }
                    setBottomsUpTurnNumber(nextTurn);
                    setBottomsUpActiveTeam(1);
                    setActiveTimer(1);
                }
                
                setTeam1Time(30);
                setTeam2Time(30);
                setBottomsUpPhase('ready');

            const handleBottomsUpNextTurn = () => {
                setBottomsUpConfirmedAnswer(null);
                setBottomsUpAnimating(false);
                setBottomsUpAnimationValue(0);
                setBottomsUpHostInput('');
                
                if (bottomsUpActiveTeam === 1) {
                    // Move to Team 2's turn (same turn number)
                    setBottomsUpActiveTeam(2);
                    setActiveTimer(2);
                    setTeam1Time(30);
                    setTeam2Time(30);
                    setBottomsUpPhase('ready');
                } else {
                    // Team 2 just finished - check if round is over
                    const nextTurn = bottomsUpTurnNumber + 1;
                    if (bottomsUpTurnNumber >= 5 && bonusScore1 !== bonusScore2) {
                        // All turns done and there's a winner
                        handleBottomsUpComplete();
                        return;
                    }
                    // Continue to next turn (or keep going if tied)
                    setBottomsUpTurnNumber(nextTurn);
                    setBottomsUpActiveTeam(1);
                    setActiveTimer(1);
                    setTeam1Time(30);
                    setTeam2Time(30);
                    setBottomsUpPhase('ready');
                }

            const handleBottomsUpComplete = () => {
                const winner = bonusScore1 > bonusScore2 ? 1 : 2;
                
                if (currentRound === 14) {

                    if (winner === 1) {
                        setTeam1Score(team1Score + 1);
                    } else {
                        setTeam2Score(team2Score + 1);
                    }
                    // Check final scores to declare match winner
                    const finalScore1 = team1Score + (winner === 1 ? 1 : 0);
                    const finalScore2 = team2Score + (winner === 2 ? 1 : 0);
                    setTimeout(() => {
                        setWinnerTeam(finalScore1 > finalScore2 ? selectedTeam1 : selectedTeam2);
                        setShowWinnerScreen(true);
                    }, 500);
                    // Reset bonus states
                    setBonusScore1(0);
                    setBonusScore2(0);
                    setBottomsUpTurnNumber(1);
                    setBottomsUpActiveTeam(1);
                    setBottomsUpUsedAnswers([]);
                    setBottomsUpPhase('question');
                    setIsTieBreaker(false);
                    setTieBreakerType(null);
                    return;
                }
                
                // Regular bonus - worth 2 match points
                if (winner === 1) {

                    setTeam2Score(team2Score + 2);
                }
                
                // Move to next round

                setCurrentQuestion(1);
                setActiveTeam(1);
                setActiveTimer(1);
                setTeam1Time(30);
                setTeam2Time(15);
                setShowCategory(false);
                setShowQuestion(false);
                setTimerRunning(false);
                
                // Reset all Bottoms Up states
                setBonusScore1(0);
                setBonusScore2(0);
                setBottomsUpTurnNumber(1);
                setBottomsUpActiveTeam(1);
                setBottomsUpUsedAnswers([]);
                setBottomsUpPhase('question');
                setBottomsUpConfirmedAnswer(null);
                setBottomsUpAnimating(false);
                setBottomsUpAnimationValue(0);
                setBottomsUpHostInput('');

            const runBottomsUpAnimation = (pointValue, isCorrect, activeTeamSnapshot) => {
                setBottomsUpAnimating(true);
                setBottomsUpShowAnswer(true);
                setBottomsUpFlyingScore(false);
                setBottomsUpAnimationValue(0);

                if (!isCorrect || pointValue === 0) {
                    setTimeout(() => {
                        setBottomsUpAnimationValue(-1);
                        setTimeout(() => {
                            setBottomsUpAnimating(false);
                            setBottomsUpShowAnswer(false);
                            setBottomsUpPhase('between');
                        }, 2000);
                    }, 800);
                    return;
                }

                let current = 0;
                const getDelay = (step, total) => {
                    const progress = step / total;
                    return Math.round(200 - (180 * progress));
                };

                const tick = (step) => {
                    if (step > pointValue) {
                        // Counter done - start glow phase
                        setBottomsUpGlowing(true);
                        
                        // After 2 seconds of glowing, start the fly phase
                        setTimeout(() => {
                            setBottomsUpGlowing(false);
                            setBottomsUpShowAnswer(false);
                            setBottomsUpFlyingScore(true);
                            
                            setTimeout(() => {
                                if (activeTeamSnapshot === 1) {
                                    setBonusScore1(prev => prev + pointValue);
                                } else {
                                    setBonusScore2(prev => prev + pointValue);
                                }
                                setBottomsUpFlyingScore(false);
                                setBottomsUpAnimating(false);
                                setBottomsUpPhase('between');
                            }, 1600);
                        }, 2000);
                        return;
                    }
                    setBottomsUpAnimationValue(step);
                    setTimeout(() => tick(step + 1), getDelay(step, pointValue));
                };

                setTimeout(() => tick(1), 800);
            };
            
            const handleRevealShootoutBoard = () => {
                setShootoutBoardRevealed(true);
                setShootoutActiveTeam(1);
                setShootoutTurnCount(0);
                setTimerRunning(true); // Auto-start timer for Team 1
                
                // Mark this Shootout question as used
                const activeShootoutQ = shootoutQuestions[0];
                if (activeShootoutQ && selectedMatch) {
                    markQuestionUsed('SHOOTOUT', selectedMatch.name, null, activeShootoutQ.colIndex);
                }
            };
            
            const handleShootoutAnswer = (answerIndex) => {
                if (shootoutRevealedAnswers.includes(answerIndex)) return;
                
                // Reveal the answer
                setShootoutRevealedAnswers([...shootoutRevealedAnswers, answerIndex]);
                
                // Calculate new scores
                const newScore1 = shootoutActiveTeam === 1 ? bonusScore1 + 1 : bonusScore1;
                const newScore2 = shootoutActiveTeam === 2 ? bonusScore2 + 1 : bonusScore2;
                
                // Award point to active team
                if (shootoutActiveTeam === 1) {
                    setBonusScore1(newScore1);
                } else {
                    setBonusScore2(newScore2);
                }
                
                // Calculate new turn count
                const newTurnCount = shootoutActiveTeam === 2 ? shootoutTurnCount + 1 : shootoutTurnCount;
                
                // If switching back to Team 1, increment turn count
                if (shootoutActiveTeam === 2) {
                    setShootoutTurnCount(newTurnCount);
                }
                
                // Check if game should end BEFORE switching teams
                if (newTurnCount >= 5 && shootoutSuddenDeath && shootoutActiveTeam === 2 && newScore1 !== newScore2) {
                    // Sudden death ending: Team 2 just scored/missed, there's a winner
                    setTimeout(() => handleShootoutComplete(), 100);
                    return;
                }
                
                // Check for regular end after 5 turns
                if (newTurnCount >= 5 && !shootoutSuddenDeath) {
                    if (newScore1 !== newScore2) {
                        setTimeout(() => handleShootoutComplete(), 100);
                        return;
                    } else {
                        setShootoutSuddenDeath(true);
                    }
                }
                
                // Switch to next team
                setShootoutActiveTeam(shootoutActiveTeam === 1 ? 2 : 1);
                
                // Reset timers and restart for next turn
                setTeam1Time(20);
                setTeam2Time(20);
                setTimerRunning(true);
            };
            
            const handleShootoutIncorrect = () => {
                // Calculate new turn count
                const newTurnCount = shootoutActiveTeam === 2 ? shootoutTurnCount + 1 : shootoutTurnCount;
                
                // If switching back to Team 1, increment turn count
                if (shootoutActiveTeam === 2) {
                    setShootoutTurnCount(newTurnCount);
                }
                
                // Check if game should end BEFORE switching teams
                if (newTurnCount >= 5 && shootoutSuddenDeath && shootoutActiveTeam === 2 && bonusScore1 !== bonusScore2) {
                    // Sudden death ending: Team 2 just answered, there's a winner
                    setTimeout(() => handleShootoutComplete(), 100);
                    return;
                }
                
                // Check for regular end after 5 turns
                if (newTurnCount >= 5 && !shootoutSuddenDeath) {
                    if (bonusScore1 !== bonusScore2) {
                        setTimeout(() => handleShootoutComplete(), 100);
                        return;
                    } else {
                        setShootoutSuddenDeath(true);
                    }
                }
                
                // Switch to next team without awarding points

                // Reset timers and restart for next turn
                setTeam1Time(20);
                setTeam2Time(20);
                setTimerRunning(true);

                    }

                // Check if this was the tie-breaker
                if (currentRound === 14) {
